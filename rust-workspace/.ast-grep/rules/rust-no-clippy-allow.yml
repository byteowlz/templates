id: rust-no-clippy-allow
language: Rust
severity: warning
message: "Avoid adding #[allow(clippy::...)] or #[expect(clippy::...)] without explicit review."
note: "Fix root causes when possible. If suppression is required, document why in code review."
rule:
  any:
    - pattern: "#[allow(clippy::$LINT)]"
    - pattern: "#[expect(clippy::$LINT)]"
